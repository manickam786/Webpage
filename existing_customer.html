*{
margin:0;

}

body{

background:linear-gradient(120deg,#eef2f3,#ffffff);

}

/* HEADER */

.header{

padding:15px 20px;

justify-content:center;

.logo{

.center-text{
text-align:center;
}

.center-text h1{
font-size:30px;

.center-text p{
font-size:14px;

nav{
background:#1565c0;
padding:10px;
text-align:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:500;
}

nav a:hover{

}

.content{
flex:1;
display:flex;

justify-content:center;

}

font-size:18px;

}

/* BUTTON GRID */

.customer-grid{
display:flex;
gap:30px;
flex-wrap:wrap;
justify-content:center;
}

.customer-btn{
width:240px;
height:120px;
background:white;
border-radius:15px;
text-decoration:none;
color:#0d47a1;
font-size:28px;
font-weight:600;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 8px 25px rgba(0,0,0,0.12);
transition:all .3s ease;
border:3px solid transparent;
}

.customer-btn:hover{
transform:translateY(-8px);
border-color:#1976d2;
box-shadow:0 15px 35px rgba(0,0,0,0.18);
}

/* FOOTER */

footer{
background:#0d47a1;
color:white;
text-align:center;
padding:12px;
}

/* MOBILE */

@media(max-width:768px){

.logo{
position:static;
margin-bottom:10px;
}

.header{
flex-direction:column;
}

.center-text h1{
font-size:24px;
}

.content h2{
font-size:28px;
}

.customer-btn{
width:90%;
max-width:300px;
}

}
