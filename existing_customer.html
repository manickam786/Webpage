<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Patent Tracking Portal</title>

<style>

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{

    background:white;
    padding:40px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    width:450px;
    text-align:center;

}

h2{

    color:#003366;
    margin-bottom:30px;

}

input{

    width:80%;
    padding:12px;
    font-size:18px;
    text-transform:uppercase;

}

button{

    margin-top:20px;
    padding:12px 35px;
    font-size:18px;
    background:#003366;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;

}

button:hover{

    background:#0055aa;

}

#error{

    margin-top:20px;
    color:red;
    font-weight:bold;

}

</style>

</head>

<body>

<div class="container">

<h2>Patent Tracking Portal</h2>

<p>Please enter your company name</p>

<input
type="text"
id="company"
placeholder="Example (in caps): XYZ ">

<br>

<button onclick="openPortal()">
Enter
</button>

<div id="error"></div>

</div>

<script>

function openPortal(){

    var company=document.getElementById("company").value.trim().toUpperCase();

    switch(company){

        case "HEB":
            window.location.href="heb.html";
            break;

        case "HEPF":
            window.location.href="hapf.html";
            break;

        case "SJC":
            window.location.href="sjc.html";
            break;

        default:
            document.getElementById("error").innerHTML="Invalid company name.";
    }

}

document.getElementById("company").addEventListener("keypress",function(event){

    if(event.key==="Enter"){

        openPortal();

    }

});

</script>

</body>
</html>
